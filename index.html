<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body, html { width: 100%; height: 100%; overflow: hidden; }
  #map { width: 100vw; height: 100vh; }
  .leaflet-container { background: #BAD9E8 !important; }
  .leaflet-tile { filter: sepia(8%) saturate(0.82) brightness(0.97); }

  .site-title { position: fixed; top: 28px; left: 36px; z-index: 1000; pointer-events: none; }
  .site-title h1 {
    font-family: 'Special Elite', cursive; font-size: 1.6rem; font-weight: 400;
    color: #2c2416; line-height: 1; text-shadow: 0 1px 10px rgba(255,255,255,0.95);
  }
  .site-title p {
    font-family: 'Special Elite', cursive; font-style: normal; font-size: 0.82rem;
    color: #6b5c47; margin-top: 3px; text-shadow: 0 1px 8px rgba(255,255,255,0.9);
  }

  /* halo canvas sits between tiles and markers */
  #halo-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 200;
  }

  .city-pin { position: relative; cursor: pointer; }
  .pin-dot {
    width: 20px; height: 20px; border: 3px solid white; border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.28); transition: transform 0.2s;
  }
  .pin-dot.resident { background: #7ab87a; }
  .city-pin:hover .pin-dot { transform: scale(1.5); }
  .pin-label {
    position: absolute; bottom: 22px; left: 50%;
    transform: translateX(-50%) translateY(4px);
    background: rgba(250,247,242,0.97); color: #2c2416;
    font-family: 'Special Elite', cursive; font-size: 14px; font-weight: 400;
    padding: 4px 12px; border-radius: 20px; white-space: nowrap;
    border: 1px solid #e8c5a8; box-shadow: 0 3px 12px rgba(0,0,0,0.12);
    opacity: 0; pointer-events: none; transition: opacity 0.18s, transform 0.18s;
  }
  .city-pin:hover .pin-label { opacity: 1; transform: translateX(-50%) translateY(0); }

  .v-pin { position: relative; cursor: default; }
  .v-dot {
    width: 10px; height: 10px; background: #4a8faf;
    border: 1.5px solid rgba(255,255,255,0.9); border-radius: 50%;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2); transition: transform 0.2s;
  }
  .v-pin:hover .v-dot { transform: scale(1.8); }
  .v-label {
    position: absolute; bottom: 14px; left: 50%;
    transform: translateX(-50%) translateY(4px);
    background: rgba(250,247,242,0.97); color: #2c2416;
    font-family: 'Special Elite', cursive; font-size: 12px; font-weight: 400;
    padding: 3px 10px; border-radius: 20px; white-space: nowrap;
    border: 1px solid #e8c5a8; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    opacity: 0; pointer-events: none; transition: opacity 0.18s, transform 0.18s; z-index: 999;
  }
  .v-pin:hover .v-label { opacity: 1; transform: translateX(-50%) translateY(0); }

  .hint {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-family: 'Special Elite', cursive; font-size: 0.9rem; color: #6b5c47;
    background: rgba(250,247,242,0.85); padding: 6px 20px; border-radius: 30px;
    z-index: 1000; pointer-events: none; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  .legend {
    position: fixed; bottom: 60px; right: 20px; z-index: 1000;
    background: rgba(250,247,242,0.92); border: 1px solid #e8c5a8;
    border-radius: 10px; padding: 10px 14px;
    font-family: 'Special Elite', cursive; font-size: 12px; color: #6b5c47;
    pointer-events: none; line-height: 2.2;
  }
  .legend-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .legend-dot-green { width: 13px; height: 13px; background: #7ab87a; border: 2px solid white; border-radius: 50%; box-shadow: 0 1px 4px rgba(0,0,0,0.2); flex-shrink: 0; }
  .legend-dot-blue { width: 8px; height: 8px; background: #4a8faf; border: 1.5px solid white; border-radius: 50%; flex-shrink: 0; }

  /* ── SPLASH ── */
  #splash {
    position: fixed; inset: 0; z-index: 9000;
    background: #f5ede0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer;
    transition: opacity 0.8s ease;
  }

  #splash.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  .splash-title {
    font-family: 'Special Elite', cursive;
    font-size: clamp(2.4rem, 6vw, 4.2rem);
    color: #2c2416;
    line-height: 1;
    text-align: center;
  }

  .splash-sub {
    font-family: 'Special Elite', cursive;
    font-size: clamp(0.9rem, 2vw, 1.15rem);
    color: #6b5c47;
    margin-top: 14px;
    letter-spacing: 0.04em;
    text-align: center;
  }

  .splash-cta {
    margin-top: 52px;
    font-family: 'Special Elite', cursive;
    font-size: 0.95rem;
    color: #b8a898;
    letter-spacing: 0.08em;
    animation: pulse 2.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50%       { opacity: 1; }
  }

  .splash-deco {
    font-size: 3rem;
    margin-bottom: 28px;
    opacity: 0.55;

    content: '';
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
    pointer-events: none;

// Canvas halo drawing
const canvas = document.getElementById('halo-canvas');
const ctx = canvas.getContext('2d');

function drawHalos() {
  const size = map.getSize();
  canvas.width  = size.x;
  canvas.height = size.y;
  canvas.style.width  = size.x + 'px';
  canvas.style.height = size.y + 'px';
  ctx.clearRect(0, 0, size.x, size.y);

  const zoom = map.getZoom();
  // scale halo radius with zoom
  const baseRadius = Math.pow(2, zoom - 2) * 90;

  allSpots.forEach(spot => {
    const pt = map.latLngToContainerPoint([spot.lat, spot.lng]);
    const r = baseRadius * spot.r;

    const grad = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, r);
    grad.addColorStop(0,   'rgba(44, 100, 148, 0.38)');
    grad.addColorStop(0.35, 'rgba(44, 100, 148, 0.20)');
    grad.addColorStop(0.7, 'rgba(44, 100, 148, 0.07)');
    grad.addColorStop(1,   'rgba(44, 100, 148, 0)');

    ctx.beginPath();
    ctx.arc(pt.x, pt.y, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  });
}

// Redraw on map move/zoom
map.on('move zoom viewreset', drawHalos);
map.on('load', drawHalos);
setTimeout(drawHalos, 300);

  const icon = L.divIcon({
    className: '',
    html: `<div class="v-pin"><div class="v-label">${spot.name}</div><div class="v-dot"></div></div>`,
    iconSize: [10, 10], iconAnchor: [5, 5]
  });
  L.marker([spot.lat, spot.lng], { icon }).addTo(map);
});

// ── SPLASH ──
const splash = document.getElementById('splash');
splash.addEventListener('click', () => {
  splash.classList.add('fade-out');
  setTimeout(() => splash.remove(), 800);
});

</script>
</body>
